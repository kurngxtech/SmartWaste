<div class="flex min-h-screen font-sans antialiased">
   <!-- left image -->
   <div class="hidden md:flex w-[70%] bg-gray-100 items-center justify-center overflow-hidden">
      <img src="login-page-img.jpg" alt="SavePlate Login" class="w-full h-full object-cover" />
   </div>

   <!-- right login form -->
   <div
      class="w-full md:w-[30%] bg-gradient-to-br from-green-700 to-green-900 flex flex-col justify-center p-8 lg:p-12 text-white shadow-2xl">

      <div class="w-full max-w-md mx-auto">
         <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-bold tracking-tight mb-2">LOGIN</h1>
            <p class="text-green-100 opacity-80">Welcome back to SavePlate</p>
         </header>

         <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <div>
               <label for="email" class="block text-sm font-semibold mb-2 ml-1">Email Address</label>
               <input type="email" id="email" formControlName="email" placeholder="name@example.com"
                  class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white/20 transition-all duration-200"
                  [ngClass]="{'border-red-400 ring-1 ring-red-400': f['email'].touched && f['email'].errors}" />
               <div *ngIf="f['email'].touched && f['email'].errors" class="mt-2 ml-1 text-xs text-red-300 font-medium">
                  <span *ngIf="f['email'].errors['required']">Email is required.</span>
                  <span *ngIf="f['email'].errors['email']">Please enter a valid email format.</span>
               </div>
            </div>

            <div>
               <div class="flex justify-between items-center mb-2 ml-1">
                  <label for="password" class="text-sm font-semibold">Password</label>
                  <a href="#" class="text-xs text-green-300 hover:text-white transition-colors">Forgot Password?</a>
               </div>
               <input type="password" id="password" formControlName="password" placeholder="••••••••"
                  class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white/20 transition-all duration-200"
                  [ngClass]="{'border-red-400 ring-1 ring-red-400': f['password'].touched && f['password'].errors}" />
               <div *ngIf="f['password'].touched && f['password'].errors"
                  class="mt-2 ml-1 text-xs text-red-300 font-medium">
                  <span *ngIf="f['password'].errors['required']">Password is required.</span>
                  <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters.</span>
               </div>
            </div>

            <div class="flex items-center space-x-2 ml-1">
               <input type="checkbox" id="rememberMe" formControlName="rememberMe"
                  class="w-4 h-4 rounded border-gray-300 text-green-600 focus:ring-green-500 cursor-pointer" />
               <label for="rememberMe" class="text-sm text-green-100 cursor-pointer select-none">Remember Me</label>
            </div>

            <button type="submit" [disabled]="loginForm.invalid" routerLink="/dashboard"
               class="w-full py-4 px-6 rounded-lg bg-green-500 hover:bg-green-400 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold text-lg shadow-lg transform active:scale-[0.98] transition-all duration-150">
               Sign In
            </button>

         </form>

         <footer class="mt-12 text-center">
            <p class="text-sm text-green-100">
               New to SavePlate?
               <a routerLink="/signup" class="font-bold text-white hover:underline underline-offset-4 cursor-pointer">Sign up</a>
            </p>
         </footer>
      </div>

   </div>
</div>
