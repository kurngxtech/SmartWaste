<header
   class="sticky top-0 flex items-center justify-between md:justify-end h-16 px-6 bg-gray-900 border-b border-gray-200 shadow-sm z-50">
   <div class="md:hidden flex items-center">
      <button (click)="layoutService.toggleSidebar()" class="p-2 mr-2 -ml-2 text-white hover:text-green-600 transition-colors focus:outline-none">
         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
         </svg>
      </button>
      <div class="font-bold text-white text-2xl">SAVEPLATE</div>
   </div>

   <div class="flex items-center space-x-4">
      <button class="relative p-2 text-white hover:text-green-600 transition-colors focus:outline-none"
         routerLink="/notifications">
         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
               d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
            </path>
         </svg>
         <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
      </button>

      <button
         class="relative flex items-center justify-center p-1 rounded-full hover:bg-green-50 ring-2 ring-transparent hover:ring-green-500 transition-all focus:outline-none group"
         routerLink="/userDetail">
         <img src="/app-logo/user_blank.ico" alt="User"
            class="w-8 h-8 rounded-full object-cover opacity-75 group-hover:opacity-100 transition-opacity">
      </button>
   </div>
</header>
