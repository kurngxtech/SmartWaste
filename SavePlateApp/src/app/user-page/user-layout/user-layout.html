<div class="flex h-screen bg-gray-100 font-sans overflow-hidden">

  <aside class="hidden md:flex flex-col w-64 bg-gray-800 text-gray-300 transition-all duration-300">
    <div class="flex items-center justify-center h-16 border-b border-gray-700 bg-gray-900">
      <span class="text-2xl font-black text-white tracking-wider">SAVEPLATE</span>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-2">
      @for (item of menuItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive
          #rla="routerLinkActive"
          [ngClass]="rla.isActive ? 'bg-green-600 text-white shadow-md' : 'hover:bg-gray-700 hover:text-white'"
          class="flex items-center px-4 py-3 rounded-lg transition-all duration-200 cursor-pointer"
        >
          <span class="mr-3">{{ item.icon }}</span>
          <span class="font-medium text-sm">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="p-4 border-t border-gray-700 bg-gray-800 hover:bg-gray-700 cursor-pointer transition-colors">
      <div class="flex items-center">
        <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-white font-bold mr-3">U</div>
        <div>
          <p class="text-sm font-semibold text-white">User Detail</p>
          <p class="text-xs text-gray-400">Household Account</p>
        </div>
      </div>
    </div>
  </aside>

  <div class="flex flex-col flex-1 overflow-hidden">
    <header class="flex items-center justify-between md:justify-end h-16 px-6 bg-white border-b border-gray-200 shadow-sm z-10">
      <div class="md:hidden font-bold text-green-700 text-xl">SavePlate</div>
      <div class="flex items-center space-x-4">
        <button class="relative p-2 text-gray-400 hover:text-green-600 transition-colors focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
            </path>
          </svg>
          <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
        </button>
        <div class="flex items-center px-3 py-1.5 bg-gray-100 rounded-lg cursor-pointer hover:bg-gray-200 transition-colors">
          <span class="text-sm font-semibold text-gray-700">USER</span>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-gray-50">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
