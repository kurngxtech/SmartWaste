<div class="modal-backdrop" (click)="onClose()"></div>

<div class="modal-container">
  <div class="modal-header">
    <h2 class="modal-title">Plan a meal</h2>
    <button class="btn-close" type="button" (click)="onClose()" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Meal name -->
  <div class="form-group">
    <label class="form-label">Meal name <span class="required">*</span></label>
    <input
      type="text"
      class="form-input"
      placeholder="e.g. Spinach omelette"
      [ngModel]="mealName()"
      (ngModelChange)="mealName.set($event); error.set('')"
    />
    <p class="error-msg" *ngIf="error()">{{ error() }}</p>
  </div>

  <!-- Day + Slot -->
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Day <span class="required">*</span></label>
      <select class="form-input" [ngModel]="selectedDay()" (ngModelChange)="selectedDay.set($event)">
        <option *ngFor="let d of days" [value]="d">{{ d }}</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Meal slot <span class="required">*</span></label>
      <select class="form-input" [ngModel]="selectedSlot()" (ngModelChange)="selectedSlot.set($event)">
        <option *ngFor="let s of slots" [value]="s">{{ s }}</option>
      </select>
    </div>
  </div>

  <!-- Inventory ingredients -->
  <div class="form-group">
    <label class="form-label">
      Ingredients from inventory
      <span class="optional" *ngIf="selectedIngredients().length > 0">
        ({{ selectedIngredients().length }} selected)
      </span>
    </label>

    <div class="ingredient-list" *ngIf="availableItems.length > 0; else noItems">
      <div
        *ngFor="let item of availableItems"
        class="ingredient-row"
        [class.selected]="isIngredientSelected(item.id)"
      >
        <label class="ingredient-check">
          <input
            type="checkbox"
            [checked]="isIngredientSelected(item.id)"
            (change)="toggleIngredient(item)"
          />
          <span class="ingredient-name">{{ item.name }}</span>
          <span class="ingredient-meta">{{ item.category }} · {{ item.quantity }} available</span>
          <span class="badge-expiring" *ngIf="isExpiringItem(item)">
            {{ item.status === 'expired' ? 'Expired' : 'Expiring' }}
          </span>
        </label>

        <div class="qty-control" *ngIf="isIngredientSelected(item.id)">
          <button
            type="button"
            class="qty-btn"
            (click)="updateQty(item.id, getIngredientQty(item.id) - 1)"
          >−</button>
          <span class="qty-val">{{ getIngredientQty(item.id) }}</span>
          <button
            type="button"
            class="qty-btn"
            (click)="updateQty(item.id, getIngredientQty(item.id) + 1)"
            [disabled]="getIngredientQty(item.id) >= item.quantity"
          >+</button>
        </div>
      </div>
    </div>

    <ng-template #noItems>
      <p class="empty-hint">No items in inventory yet. Add meal manually without linking.</p>
    </ng-template>
  </div>

  <!-- Notes -->
  <div class="form-group">
    <label class="form-label">Notes <span class="optional">(optional)</span></label>
    <textarea
      class="form-input form-textarea"
      placeholder="Add preparation notes..."
      [ngModel]="notes()"
      (ngModelChange)="notes.set($event)"
      rows="2"
    ></textarea>
  </div>

  <!-- Reminder toggle -->
  <div class="form-toggle">
    <label class="toggle-label">
      <input
        type="checkbox"
        [checked]="reminderEnabled()"
        (change)="reminderEnabled.set(!reminderEnabled())"
      />
      <span>Schedule a reminder for this meal</span>
    </label>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn-cancel" (click)="onClose()">Cancel</button>
    <button type="button" class="btn-save" (click)="onSave()">Save meal</button>
  </div>
</div>
