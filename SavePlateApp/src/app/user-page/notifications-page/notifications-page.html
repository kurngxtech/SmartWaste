<div class="flex h-screen bg-gray-100 font-sans overflow-hidden">
   <app-side-bar-navigation></app-side-bar-navigation>

   <div class="flex flex-col flex-1 overflow-hidden">
      <app-header></app-header>

      <div class="flex-1 overflow-y-auto bg-gray-50 p-6 md:p-8">
         <div class="max-w-4xl mx-auto">

            <button routerLink="/dashboard"
               class="inline-flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-green-700 transition-colors mb-6 bg-transparent border-none cursor-pointer p-0">
               <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                  </path>
               </svg>
               Back to Dashboard
            </button>

            <div class="flex items-end justify-between mb-8">
               <div>
                  <h1 class="text-2xl md:text-3xl font-semibold text-gray-900 m-0 mb-1">Notifications</h1>
                  <p class="text-sm text-gray-500 m-0">Stay updated on your inventory and community activity.</p>
               </div>
               <button
                  class="text-sm font-medium text-green-700 hover:text-green-800 transition-colors bg-transparent border-none cursor-pointer">
                  Mark all as read
               </button>
            </div>

            <div class="space-y-4">
               <div *ngFor="let notif of notifications"
                  class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm hover:shadow-md hover:border-gray-300 transition-all flex items-start gap-4 group">

                  <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" [ngClass]="{
                          'bg-amber-50 text-amber-600': notif.type === 'warning', 
                          'bg-green-50 text-green-600': notif.type === 'success', 
                          'bg-red-50 text-red-600': notif.type === 'danger'
                       }">
                     <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="notif.icon" />
                     </svg>
                  </div>

                  <div class="flex-1 min-w-0">
                     <div class="flex items-start justify-between gap-3 mb-1.5">
                        <h3 class="text-[15px] font-semibold text-gray-900 truncate m-0">{{ notif.title }}</h3>
                        <span class="text-xs font-medium text-gray-400 whitespace-nowrap mt-0.5">{{ notif.time }}</span>
                     </div>
                     <p class="text-[13px] text-gray-600 mb-4 m-0 leading-relaxed">{{ notif.description }}</p>

                     <div class="flex items-center gap-3">
                        <button
                           class="px-5 py-2 text-[13px] font-medium text-white bg-green-700 hover:bg-green-800 rounded-lg transition-colors cursor-pointer border-none shadow-sm">
                           {{ notif.action }}
                        </button>
                     </div>
                  </div>

                  <button
                     class="text-gray-300 hover:text-gray-600 hover:bg-gray-100 transition-colors cursor-pointer p-1.5 rounded-lg border-none bg-transparent">
                     <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path
                           d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z">
                        </path>
                     </svg>
                  </button>

               </div>
            </div>

         </div>
      </div>
   </div>
</div>
