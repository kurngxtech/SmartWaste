<div class="modal-backdrop" (click)="onClose()"></div>

<div class="modal-container">
  <div class="modal-header">
    <h2 class="modal-title">Add Food Item</h2>
    <button class="btn-close" type="button" (click)="onClose()" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <form #itemForm="ngForm" (ngSubmit)="onSubmit(itemForm)" novalidate>

    <!-- Item Name -->
    <div class="form-group">
      <label class="form-label" for="itemName">Item name <span class="required">*</span></label>
      <input
        id="itemName"
        name="name"
        type="text"
        class="form-input"
        [class.input-error]="nameField.invalid && nameField.touched"
        placeholder="e.g. Spinach"
        [(ngModel)]="form.name"
        #nameField="ngModel"
        required
        minlength="2"
        maxlength="100"
      />
      <p class="error-msg" *ngIf="nameField.invalid && nameField.touched">
        Item name is required (min 2 characters).
      </p>
    </div>

    <!-- Category + Location -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="category">Category <span class="required">*</span></label>
        <select
          id="category"
          name="category"
          class="form-input"
          [(ngModel)]="form.category"
          required
        >
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="location">Storage location <span class="required">*</span></label>
        <select
          id="location"
          name="storageLocation"
          class="form-input"
          [(ngModel)]="form.storageLocation"
          required
        >
          <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
        </select>
      </div>
    </div>

    <!-- Quantity + Expiry -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="quantity">Quantity <span class="required">*</span></label>
        <input
          id="quantity"
          name="quantity"
          type="number"
          class="form-input"
          [class.input-error]="qtyField.invalid && qtyField.touched"
          placeholder="1"
          [(ngModel)]="form.quantity"
          #qtyField="ngModel"
          required
          min="1"
          max="9999"
        />
        <p class="error-msg" *ngIf="qtyField.invalid && qtyField.touched">
          Quantity must be at least 1.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="expiryDate">Expiry date <span class="required">*</span></label>
        <input
          id="expiryDate"
          name="expiryDate"
          type="date"
          class="form-input"
          [class.input-error]="expiryField.invalid && expiryField.touched"
          [(ngModel)]="form.expiryDate"
          #expiryField="ngModel"
          [min]="today"
          required
        />
        <p class="error-msg" *ngIf="expiryField.invalid && expiryField.touched">
          Expiry date is required.
        </p>
      </div>
    </div>

    <!-- Remarks -->
    <div class="form-group">
      <label class="form-label" for="remarks">Remarks / note <span class="optional">(optional)</span></label>
      <textarea
        id="remarks"
        name="remarks"
        class="form-input form-textarea"
        placeholder="Additional notes about this item..."
        [(ngModel)]="form.remarks"
        maxlength="300"
        rows="3"
      ></textarea>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn-cancel" (click)="onClose()">Cancel</button>
      <button type="submit" class="btn-save" [disabled]="itemForm.invalid">
        Save item
      </button>
    </div>

  </form>
</div>
