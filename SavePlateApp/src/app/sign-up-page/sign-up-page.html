<div class="flex min-h-screen font-sans antialiased bg-cover bg-center relative items-center justify-center" style="background-image: url('login-page-img.jpg');">
   <!-- Dark overlay for better form readability -->
   <div class="absolute inset-0 bg-black/40 z-0"></div>

   <!-- center form -->
   <div
      class="w-full max-w-lg bg-gradient-to-b from-green-700/95 to-green-900/95 flex flex-col justify-center p-8 lg:p-10 text-white shadow-2xl z-10 sm:rounded-2xl backdrop-blur-sm m-4">

      <div class="w-full mx-auto">
         <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold tracking-tight mb-2">Sign Up</h1>
            <p class="text-green-100 opacity-80 text-sm">Create your SavePlate account</p>
         </header>

         <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()" class="space-y-5">

            <div>
               <label for="fullName" class="block text-sm font-semibold mb-1 ml-1">Full Name</label>
               <input type="text" id="fullName" formControlName="fullName" placeholder="John Doe"
                  class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white/20 transition-all duration-200"
                  [ngClass]="{'border-red-400 ring-1 ring-red-400': f['fullName'].touched && f['fullName'].errors}" />
               <div *ngIf="f['fullName'].touched && f['fullName'].errors"
                  class="mt-1 ml-1 text-xs text-red-300 font-medium">
                  <span *ngIf="f['fullName'].errors['required']">Full name is required.</span>
               </div>
            </div>

            <div>
               <label for="email" class="block text-sm font-semibold mb-1 ml-1">Email Address</label>
               <input type="email" id="email" formControlName="email" placeholder="name@example.com"
                  class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white/20 transition-all duration-200"
                  [ngClass]="{'border-red-400 ring-1 ring-red-400': f['email'].touched && f['email'].errors}" />
               <div *ngIf="f['email'].touched && f['email'].errors" class="mt-1 ml-1 text-xs text-red-300 font-medium">
                  <span *ngIf="f['email'].errors['required']">Email is required.</span>
                  <span *ngIf="f['email'].errors['email']">Please enter a valid email.</span>
               </div>
            </div>

            <div>
               <label for="password" class="block text-sm font-semibold mb-1 ml-1">Password</label>
               <input type="password" id="password" formControlName="password" placeholder="••••••••"
                  class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white/20 transition-all duration-200"
                  [ngClass]="{'border-red-400 ring-1 ring-red-400': f['password'].touched && f['password'].errors}" />
               <div *ngIf="f['password'].touched && f['password'].errors"
                  class="mt-1 ml-1 text-xs text-red-300 font-medium">
                  <span *ngIf="f['password'].errors['required']">Password is required.</span>
                  <span *ngIf="f['password'].errors['minlength']">Minimum 6 characters.</span>
               </div>
            </div>

            <div>
               <label for="householdSize" class="block text-sm font-semibold mb-1 ml-1">Household Size</label>
               <input type="number" id="householdSize" formControlName="householdSize" placeholder="e.g., 2" min="1"
                  class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 focus:bg-white/20 transition-all duration-200"
                  [ngClass]="{'border-red-400 ring-1 ring-red-400': f['householdSize'].touched && f['householdSize'].errors}" />
               <div *ngIf="f['householdSize'].touched && f['householdSize'].errors"
                  class="mt-1 ml-1 text-xs text-red-300 font-medium">
                  <span *ngIf="f['householdSize'].errors['required']">Household size is required.</span>
                  <span *ngIf="f['householdSize'].errors['min']">Must be at least 1.</span>
               </div>
            </div>

            <button type="submit" [disabled]="signUpForm.invalid"
               class="w-full py-4 mt-2 rounded-lg bg-green-500 hover:bg-green-400 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold shadow-lg transform active:scale-[0.98] transition-all duration-150">
               Sign Up
            </button>

         </form>

         <footer class="mt-8 text-center">
            <p class="text-sm text-green-100">
               Already have an account?
               <a routerLink="/login" class="font-bold text-white hover:underline underline-offset-4 cursor-pointer">Login
                  here</a>
            </p>
         </footer>
      </div>

   </div>

</div>
