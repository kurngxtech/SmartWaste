<div class="fixed inset-0 bg-black/45 z-40" (click)="onClose()"></div>

<div
   class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 bg-white rounded-2xl border border-gray-200 p-6 md:p-7 w-full max-w-lg max-h-[90vh] overflow-y-auto">

   <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-gray-900 m-0">Plan a meal</h2>
      <button
         class="bg-transparent border-none cursor-pointer text-gray-500 p-1 rounded-md flex items-center hover:bg-gray-100 hover:text-gray-900 transition-colors"
         type="button" (click)="onClose()" aria-label="Close">
         <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
         </svg>
      </button>
   </div>

   <div class="mb-4">
      <label class="block text-[13px] font-medium text-gray-700 mb-1.5">Meal name <span
            class="text-red-500">*</span></label>
      <input type="text"
         class="w-full px-3 py-2 text-sm text-gray-900 bg-gray-50 border border-gray-200 rounded-lg outline-none transition-all focus:border-green-600 focus:bg-white focus:ring-4 focus:ring-green-600/10"
         placeholder="e.g. Spinach omelette" [ngModel]="mealName()"
         (ngModelChange)="mealName.set($event); error.set('')" />
      <p class="text-xs text-red-500 mt-1" *ngIf="error()">{{ error() }}</p>
   </div>

   <div class="grid grid-cols-2 gap-3 mb-4">
      <div>
         <label class="block text-[13px] font-medium text-gray-700 mb-1.5">Day <span
               class="text-red-500">*</span></label>
         <select
            class="w-full px-3 py-2 text-sm text-gray-900 bg-gray-50 border border-gray-200 rounded-lg outline-none transition-all focus:border-green-600 focus:bg-white focus:ring-4 focus:ring-green-600/10 cursor-pointer appearance-none bg-no-repeat pr-8"
            style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22%3E%3Cpath fill=%22%236b7280%22 d=%22M6 8L1 3h10z%22/%3E%3C/svg%3E'); background-position: right 12px center;"
            [ngModel]="selectedDay()" (ngModelChange)="selectedDay.set($event)">
            <option *ngFor="let d of days" [value]="d">{{ d }}</option>
         </select>
      </div>

      <div>
         <label class="block text-[13px] font-medium text-gray-700 mb-1.5">Meal slot <span
               class="text-red-500">*</span></label>
         <select
            class="w-full px-3 py-2 text-sm text-gray-900 bg-gray-50 border border-gray-200 rounded-lg outline-none transition-all focus:border-green-600 focus:bg-white focus:ring-4 focus:ring-green-600/10 cursor-pointer appearance-none bg-no-repeat pr-8"
            style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22%3E%3Cpath fill=%22%236b7280%22 d=%22M6 8L1 3h10z%22/%3E%3C/svg%3E'); background-position: right 12px center;"
            [ngModel]="selectedSlot()" (ngModelChange)="selectedSlot.set($event)">
            <option *ngFor="let s of slots" [value]="s">{{ s }}</option>
         </select>
      </div>
   </div>

   <div class="mb-4">
      <label class="block text-[13px] font-medium text-gray-700 mb-1.5">
         Ingredients from inventory
         <span class="text-gray-400 font-normal text-xs" *ngIf="selectedIngredients().length > 0">
            ({{ selectedIngredients().length }} selected)
         </span>
      </label>

      <div class="border border-gray-200 rounded-lg max-h-[200px] overflow-y-auto bg-white"
         *ngIf="availableItems.length > 0; else noItems">
         <div *ngFor="let item of availableItems"
            class="flex items-center justify-between px-3 py-2 border-b border-gray-50 last:border-b-0 transition-colors"
            [ngClass]="{'bg-green-50': isIngredientSelected(item.id)}">

            <label class="flex items-center gap-2.5 cursor-pointer flex-1 text-[13px]">
               <input type="checkbox" class="w-4 h-4 accent-green-700 cursor-pointer"
                  [checked]="isIngredientSelected(item.id)" (change)="toggleIngredient(item)" />
               <span class="font-medium text-gray-900">{{ item.name }}</span>
               <span class="text-xs text-gray-500">{{ item.category }} · {{ item.quantity }} available</span>
               <span class="text-[10px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-800 font-medium"
                  *ngIf="isExpiringItem(item)">
                  {{ item.status === 'expired' ? 'Expired' : 'Expiring' }}
               </span>
            </label>

            <div class="flex items-center gap-1" *ngIf="isIngredientSelected(item.id)">
               <button type="button"
                  class="w-6 h-6 flex items-center justify-center bg-gray-100 border border-gray-200 rounded cursor-pointer text-sm text-gray-700 hover:bg-gray-200 disabled:opacity-40 disabled:cursor-not-allowed"
                  (click)="updateQty(item.id, getIngredientQty(item.id) - 1)">−</button>
               <span class="min-w-[22px] text-center text-[13px] font-medium text-gray-900">{{ getIngredientQty(item.id)
                  }}</span>
               <button type="button"
                  class="w-6 h-6 flex items-center justify-center bg-gray-100 border border-gray-200 rounded cursor-pointer text-sm text-gray-700 hover:bg-gray-200 disabled:opacity-40 disabled:cursor-not-allowed"
                  (click)="updateQty(item.id, getIngredientQty(item.id) + 1)"
                  [disabled]="getIngredientQty(item.id) >= item.quantity">+</button>
            </div>
         </div>
      </div>

      <ng-template #noItems>
         <p
            class="p-4 text-center text-xs text-gray-400 bg-gray-50 border border-dashed border-gray-200 rounded-lg m-0">
            No items in inventory yet. Add meal manually without linking.</p>
      </ng-template>
   </div>

   <div class="mb-4">
      <label class="block text-[13px] font-medium text-gray-700 mb-1.5">Notes <span
            class="text-gray-400 font-normal text-xs">(optional)</span></label>
      <textarea
         class="w-full px-3 py-2 text-sm text-gray-900 bg-gray-50 border border-gray-200 rounded-lg outline-none transition-all focus:border-green-600 focus:bg-white focus:ring-4 focus:ring-green-600/10 resize-y min-h-[60px]"
         placeholder="Add preparation notes..." [ngModel]="notes()" (ngModelChange)="notes.set($event)"
         rows="2"></textarea>
   </div>

   <div class="px-3 py-2.5 bg-gray-50 rounded-lg border border-gray-200 mb-1">
      <label class="flex items-center gap-2.5 cursor-pointer text-[13px] text-gray-700">
         <input type="checkbox" class="w-4 h-4 accent-green-700 cursor-pointer" [checked]="reminderEnabled()"
            (change)="reminderEnabled.set(!reminderEnabled())" />
         <span>Schedule a reminder for this meal</span>
      </label>
   </div>

   <div class="flex justify-end gap-2.5 mt-5 pt-4 border-t border-gray-100">
      <button type="button"
         class="btn-secondary"
         (click)="onClose()">Cancel</button>
      <button type="button"
         class="btn-primary"
         (click)="onSave()">Save meal</button>
   </div>
</div>
