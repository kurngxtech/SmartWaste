<!-- Mobile Overlay Backdrop -->
<div *ngIf="layoutService.isSidebarOpen()"
   class="md:hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-40 transition-opacity"
   (click)="layoutService.closeSidebar()">
</div>

<aside [ngClass]="layoutService.isSidebarOpen() ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
   class="fixed md:relative inset-y-0 left-0 z-50 flex flex-col w-64 bg-gray-800 text-gray-300 transition-transform duration-300 ease-in-out h-full shadow-2xl md:shadow-none">
   <div class="flex items-center justify-between md:justify-center h-16 px-4 border-b border-gray-700 bg-gray-900">
      <span class="text-2xl font-black text-white tracking-wider">SAVEPLATE</span>
      <button class="md:hidden p-1 text-gray-400 hover:text-white transition-colors focus:outline-none"
         (click)="layoutService.closeSidebar()">
         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
         </svg>
      </button>
   </div>
  <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-2">
      <a *ngFor="let item of menuItems" [routerLink]="item.route" (click)="layoutService.closeSidebar()"
         class="flex items-center px-4 py-3 rounded-lg transition-all duration-200 cursor-pointer"
         [ngClass]="isActive(item.route) ? 'bg-green-600 text-white shadow-md' : 'hover:bg-gray-700 hover:text-white'">
         <!-- FIX: Use img tag instead of just printing the path string -->
         <img [src]="item.icon" class="w-5 h-5 mr-3" alt="">
         <span class="font-medium text-sm">{{ item.label }}</span>
      </a>
   </nav>

   <div class="p-4 border-t border-gray-700 transition-colors cursor-pointer" routerLink="/userDetail"
      (click)="layoutService.closeSidebar()"
      [ngClass]="isActive('/userDetail') ? 'bg-gray-700' : 'bg-gray-800 hover:bg-gray-700'">
      <div class="flex items-center">
         <img *ngIf="profile.avatarUrl" [src]="profile.avatarUrl" class="w-8 h-8 rounded-full object-cover mr-3 border-2 border-transparent shrink-0" alt="User Avatar">
         <div *ngIf="!profile.avatarUrl" class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-white font-bold mr-3 uppercase shrink-0">
            {{ profile.name.charAt(0) }}
         </div>
         <div>
            <p class="text-sm font-semibold text-white">{{ profile.name }}</p>
            <p class="text-xs text-gray-400">{{ profile.householdSize }} Household</p>
         </div>
      </div>
   </div>
</aside>
